name: Diagnose PS3 Environment

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Full System Diagnosis
      run: |
        echo "========================================="
        echo "  PS3 SDK ENVIRONMENT DIAGNOSIS"
        echo "========================================="
        
        echo ""
        echo "=== 1. SYSTEM ==="
        cat /etc/os-release | grep PRETTY_NAME
        echo "Kernel: $(uname -r)"
        echo "Architecture: $(uname -m)"
        
        echo ""
        echo "=== 2. RESOURCES ==="
        echo "CPU Cores: $(nproc)"
        echo "RAM: $(free -h | awk '/Mem:/ {print $2}')"
        echo "Disk: $(df -h / | awk 'NR==2 {print $4}') free of $(df -h / | awk 'NR==2 {print $2}')"
        
        echo ""
        echo "=== 3. COMPILERS ==="
        echo -n "GCC: " && gcc --version 2>/dev/null | head -1 || echo "NOT FOUND"
        echo -n "PowerPC GCC: " && powerpc64-linux-gnu-gcc --version 2>/dev/null | head -1 || echo "NOT FOUND"
        echo -n "PS3 GCC: " && powerpc64-ps3-elf-gcc --version 2>/dev/null | head -1 || echo "NOT FOUND"
        
        echo ""
        echo "=== 4. REQUIRED TOOLS ==="
        for tool in make git wget flex bison autoconf automake libtool pkg-config; do
            echo -n "$tool: " && which $tool 2>/dev/null || echo "NOT FOUND"
        done
        
        echo ""
        echo "=== 5. LIBRARIES ==="
        echo -n "libssl: " && dpkg -l libssl-dev 2>/dev/null | grep libssl-dev | awk '{print $3}' || echo "NOT FOUND"
        echo -n "zlib: " && dpkg -l zlib1g-dev 2>/dev/null | grep zlib1g-dev | awk '{print $3}' || echo "NOT FOUND"
        echo -n "libelf: " && dpkg -l libelf-dev 2>/dev/null | grep libelf-dev | awk '{print $3}' || echo "NOT FOUND"
        echo -n "gmp: " && dpkg -l libgmp-dev 2>/dev/null | grep libgmp-dev | awk '{print $3}' || echo "NOT FOUND"
        echo -n "mpfr: " && dpkg -l libmpfr-dev 2>/dev/null | grep libmpfr-dev | awk '{print $3}' || echo "NOT FOUND"
        echo -n "mpc: " && dpkg -l libmpc-dev 2>/dev/null | grep libmpc-dev | awk '{print $3}' || echo "NOT FOUND"
        
        echo ""
        echo "=== 6. PATHS ==="
        echo "HOME: $HOME"
        echo "PS3DEV: ${PS3DEV:-NOT SET}"
        echo "PSL1GHT: ${PSL1GHT:-NOT SET}"
        echo "PATH includes ps3dev: $(echo $PATH | grep -o 'ps3dev' || echo NO)"
        
        echo ""
        echo "=== 7. PERMISSIONS ==="
        echo -n "/ppu (system): " && touch /ppu/.test 2>/dev/null && echo "WRITABLE" || echo "BLOCKED (needs root)"
        echo -n "$HOME (user): " && touch $HOME/.test 2>/dev/null && echo "WRITABLE" && rm $HOME/.test || echo "BLOCKED"
        echo -n "/usr/local (shared): " && touch /usr/local/.test 2>/dev/null && echo "WRITABLE" && rm /usr/local/.test || echo "BLOCKED"
        
        echo ""
        echo "=== 8. PS3 SDK STATUS ==="
        if [ -d "$HOME/ps3dev" ]; then
            echo "SDK Directory: EXISTS"
            echo "Contents: $(ls $HOME/ps3dev/ 2>/dev/null | tr '\n' ' ')"
            echo -n "make_self: " && find $HOME/ps3dev -name "make_self" -type f 2>/dev/null || echo "NOT FOUND"
            echo -n "package_finalize: " && find $HOME/ps3dev -name "package_finalize" -type f 2>/dev/null || echo "NOT FOUND"
            echo -n "ppu-gcc: " && find $HOME/ps3dev -name "ppu-gcc" -type f 2>/dev/null || echo "NOT FOUND"
        else
            echo "SDK Directory: NOT INSTALLED"
        fi
        
        echo ""
        echo "========================================="
        echo "  DIAGNOSIS COMPLETE"
        echo "========================================="
