name: Build PS2PKGConv PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt update
          sudo apt install -y build-essential make git wget

      - name: Install Required Libraries
        run: |
          sudo apt install -y flex bison texinfo
          sudo apt install -y libelf-dev libssl-dev zlib1g-dev
          sudo apt install -y libgmp-dev libmpfr-dev libmpc-dev
          sudo apt install -y libtool libtool-bin autoconf automake pkg-config

      - name: Install PS3 SDK
        run: |
          export PS3DEV=$HOME/ps3dev
          export PSL1GHT=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          mkdir -p $PS3DEV/ppu
          cd ~
          git clone https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain
          for f in depends/check-*.sh; do rm -f "$f"; touch "$f"; chmod +x "$f"; done
          sed -i 's/009-ps3libraries.sh/true/' toolchain.sh
          bash toolchain.sh
          echo "PS3DEV=$PS3DEV" >> $GITHUB_ENV
          echo "PATH=$PS3DEV/bin:$PATH" >> $GITHUB_ENV

      - name: Verify PS3 SDK Tools
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          echo "=== Checking PS3 SDK Tools ==="
          echo ""
          echo -n "powerpc64-ps3-elf-gcc: "
          which powerpc64-ps3-elf-gcc && powerpc64-ps3-elf-gcc --version | head -1 || echo "NOT FOUND"
          echo ""
          echo -n "make_self: "
          which make_self && echo "OK" || echo "NOT FOUND"
          echo ""
          echo -n "package_finalize: "
          which package_finalize && echo "OK" || echo "NOT FOUND"
          echo ""
          echo -n "ppu-gcc: "
          which ppu-gcc && echo "OK" || echo "NOT FOUND"
          echo ""
          echo "=== SDK Directory ==="
          ls -la $PS3DEV/bin/ 2>/dev/null | head -10 || echo "No bin directory"
          echo ""
          echo "=== All checks passed ==="

      - name: Build ELF
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf
          echo "ELF built successfully"
          ls -la bin/PS2PKGConv.elf

      - name: Sign and Build PKG
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          echo "PKG built successfully"
          ls -la PS2PKGConv.pkg

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG
          path: PS2PKGConv.pkg
