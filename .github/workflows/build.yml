name: Build PS2PKGConv PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install PowerPC Cross-Compiler
      run: |
        sudo apt update
        sudo apt install -y gcc-powerpc64-linux-gnu python3
    
    - name: Build ELF
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p bin
        powerpc64-linux-gnu-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf -static
    
    - name: Create SELF + PKG
      run: |
        cd $GITHUB_WORKSPACE
        python3 build_pkg_v2.py
        ls -la PS2PKGConv.pkg
    
    - name: Upload PKG
      uses: actions/upload-artifact@v4
      with:
        name: PS2PKGConv
        path: PS2PKGConv.pkg
