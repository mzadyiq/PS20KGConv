name: PS2PKG-Fast-Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # استخدام حاوية جاهزة توفر بيئة PS3 كاملة ومستقرة
    container: pokedev/psl1ght:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Sign
        run: |
          # إنشاء المجلد
          mkdir -p bin
          
          # البناء باستخدام المترجم الجاهز داخل الحاوية
          ppu-gcc -O2 -Wall -Iinclude source/main.c -o bin/app.elf
          
          # التوقيع وتحويل الملف (هذه الأدوات تأتي جاهزة ومستقرة داخل الحاوية)
          make_self bin/app.elf bin/app.self
          package_finalize bin/app.self PS20KG PS2PKG-MrMouswi.pkg

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKG-Final
          path: "*.pkg"
