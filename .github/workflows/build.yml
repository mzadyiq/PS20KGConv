name: Build PS2PKGConv PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ps3dev/ps3dev:latest
    timeout-minutes: 15
    steps:
      - name: 0-Checkout
        uses: actions/checkout@v4

      - name: 1-Verify-Environment
        run: |
          echo "=== PS3 SDK Check ==="
          which powerpc64-ps3-elf-gcc && powerpc64-ps3-elf-gcc --version | head -1 || echo "gcc missing"
          which make_self && echo "make_self OK" || echo "make_self missing"
          which package_finalize && echo "package_finalize OK" || echo "package_finalize missing"
          echo "=== All checks done ==="

      - name: 2-Build-ELF
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf
          ls -la bin/PS2PKGConv.elf

      - name: 3-Create-SELF
        run: |
          cd $GITHUB_WORKSPACE
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          ls -la bin/PS2PKGConv.self

      - name: 4-Create-PKG
        run: |
          cd $GITHUB_WORKSPACE
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          ls -la PS2PKGConv.pkg

      - name: 5-Upload-PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG
          path: PS2PKGConv.pkg
