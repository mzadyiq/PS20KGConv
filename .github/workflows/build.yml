name: Build PS2PKGConv PKG Final

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 0-Checkout
        uses: actions/checkout@v4

      - name: 1-Install-Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential make git wget flex bison texinfo libelf-dev libssl-dev zlib1g-dev libgmp-dev libmpfr-dev libmpc-dev libtool libtool-bin autoconf automake pkg-config gcc-powerpc64-linux-gnu
          echo "OK: Dependencies installed"

      - name: 2-Clone-Fix-Toolchain
        run: |
          cd ~
          git clone https://github.com/ps3dev/ps3toolchain || echo "Already cloned"
          cd ps3toolchain
          for f in depends/check-*.sh; do rm -f "$f"; touch "$f"; chmod +x "$f"; done
          echo "OK: Toolchain ready"

      - name: 3-Build-binutils-only
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          mkdir -p $PS3DEV/ppu
          cd ~/ps3toolchain
          bash scripts/001-binutils-PPU.sh
          echo "OK: binutils built"

      - name: 4-Build-PSL1GHT-only
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd ~/ps3toolchain
          bash scripts/008-psl1ght.sh
          echo "OK: PSL1GHT built"

      - name: 5-Link-PowerPC-GCC
        run: |
          export PS3DEV=$HOME/ps3dev
          mkdir -p $PS3DEV/bin
          cd $PS3DEV/bin
          ln -sf /usr/bin/powerpc64-linux-gnu-gcc powerpc64-ps3-elf-gcc
          ln -sf /usr/bin/powerpc64-linux-gnu-g++ powerpc64-ps3-elf-g++
          ln -sf /usr/bin/powerpc64-linux-gnu-ar powerpc64-ps3-elf-ar
          ln -sf /usr/bin/powerpc64-linux-gnu-ld powerpc64-ps3-elf-ld
          ln -sf /usr/bin/powerpc64-linux-gnu-objcopy powerpc64-ps3-elf-objcopy
          echo "OK: PowerPC GCC linked"

      - name: 6-Verify-Tools
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          echo "=== VERIFYING TOOLS ==="
          echo -n "gcc: " && which powerpc64-ps3-elf-gcc && powerpc64-ps3-elf-gcc --version | head -1 || echo "MISSING"
          echo -n "make_self: " && which make_self || echo "MISSING"
          echo -n "package_finalize: " && which package_finalize || echo "MISSING"

      - name: 7-Build-ELF
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf -static
          ls -la bin/PS2PKGConv.elf
          echo "OK: ELF built"

      - name: 8-Sign-Build-PKG
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          ls -la PS2PKGConv.pkg
          echo "OK: PKG ready"

      - name: 9-Upload-PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG
          path: PS2PKGConv.pkg
