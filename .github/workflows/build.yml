name: Build PS2PKGConv PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: 0-Checkout
        uses: actions/checkout@v4

      - name: 1-Install-Tools
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget libssl-dev zlib1g-dev libgmp-dev
          sudo apt install -y gcc-powerpc64-linux-gnu
          
          cd /tmp
          
          # build make_self
          rm -rf ps3publictools
          git clone https://github.com/ifcaro/ps3publictools
          cd ps3publictools
          gcc make_self.c -o make_self -lz -lcrypto -lssl -lgmp -w -DOPENSSL_API_COMPAT=10100
          sudo cp make_self /usr/local/bin/
          
          # build package_finalize from PSL1GHT
          cd /tmp
          rm -rf PSL1GHT
          git clone --depth 1 https://github.com/ps3dev/PSL1GHT
          cd PSL1GHT/tools/geohot
          gcc package_finalize.c -o package_finalize -lcrypto -lssl -w -DOPENSSL_API_COMPAT=10100
          sudo cp package_finalize /usr/local/bin/
          
          echo "OK: Tools installed"

      - name: 2-Build-ELF
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          powerpc64-linux-gnu-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf -static
          echo "OK: ELF built"

      - name: 3-Create-SELF
        run: |
          cd $GITHUB_WORKSPACE
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          echo "OK: SELF created"

      - name: 4-Create-PKG
        run: |
          cd $GITHUB_WORKSPACE
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          ls -la PS2PKGConv.pkg
          echo "OK: PKG ready"

      - name: 5-Upload-PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG
          path: PS2PKGConv.pkg
