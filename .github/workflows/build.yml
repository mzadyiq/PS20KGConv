name: Build PS2PKGConv PKG (Step by Step)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 0-Checkout
        uses: actions/checkout@v4

      - name: 1-Install-Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential make git wget flex bison texinfo libelf-dev libssl-dev zlib1g-dev libgmp-dev libmpfr-dev libmpc-dev libtool libtool-bin autoconf automake pkg-config
          echo "OK: Dependencies installed"

      - name: 2-Clone-Fix-Toolchain
        run: |
          cd ~
          git clone https://github.com/ps3dev/ps3toolchain || echo "Already cloned"
          cd ps3toolchain
          for f in depends/check-*.sh; do rm -f "$f"; touch "$f"; chmod +x "$f"; done
          sed -i 's/009-ps3libraries.sh/true/' toolchain.sh
          wget -q -O config.sub 'https://raw.githubusercontent.com/gcc-mirror/gcc/master/config.sub'
          wget -q -O config.guess 'https://raw.githubusercontent.com/gcc-mirror/gcc/master/config.guess'
          cp config.sub config.guess ~/ps3toolchain/
          echo "OK: Toolchain ready"

      - name: 3-Build-binutils
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          mkdir -p $PS3DEV/ppu
          cd ~/ps3toolchain
          bash scripts/001-binutils-PPU.sh
          echo "OK: binutils built"

      - name: 4-Build-GCC-Stage1
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd ~/ps3toolchain
          bash scripts/002-gcc-newlib-PPU.sh
          echo "OK: GCC Stage 1 built"

      - name: 5-Build-newlib-GCC-Stage2
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd ~/ps3toolchain
          bash scripts/006-gcc-newlib-SPU.sh
          echo "OK: newlib built"

      - name: 6-Build-PSL1GHT
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd ~/ps3toolchain
          bash scripts/008-psl1ght.sh
          echo "OK: PSL1GHT built"

      - name: 7-Verify-Tools
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          echo "=== VERIFYING TOOLS ==="
          echo -n "gcc: " && which powerpc64-ps3-elf-gcc || echo "MISSING"
          echo -n "make_self: " && which make_self || echo "MISSING"
          echo -n "package_finalize: " && which package_finalize || echo "MISSING"

      - name: 8-Build-ELF
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf
          ls -la bin/PS2PKGConv.elf
          echo "OK: ELF built"

      - name: 9-Sign-Build-PKG
        run: |
          export PS3DEV=$HOME/ps3dev
          export PATH=$PS3DEV/bin:$PATH
          cd $GITHUB_WORKSPACE
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          ls -la PS2PKGConv.pkg
          echo "OK: PKG ready"

      - name: 10-Upload-PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG
          path: PS2PKGConv.pkg
