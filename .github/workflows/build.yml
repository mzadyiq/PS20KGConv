name: Build PS2PKGConv PKG (Docker Final)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/humbertodias/ps3dev-docker:latest
    timeout-minutes: 15
    steps:
      - name: 0-Checkout
        uses: actions/checkout@v4

      - name: 1-Verify-PS3-Environment
        run: |
          echo "========================================="
          echo "  VERIFYING PS3 DOCKER ENVIRONMENT"
          echo "========================================="
          echo ""
          echo "=== User ==="
          whoami && echo "HOME: $HOME"
          echo ""
          echo "=== PS3DEV ==="
          echo "PS3DEV: ${PS3DEV:-/usr/local/ps3dev}"
          echo "PSL1GHT: ${PSL1GHT:-/usr/local/ps3dev}"
          echo ""
          echo "=== Compiler ==="
          echo -n "ppu-gcc: "
          which ppu-gcc && ppu-gcc --version 2>/dev/null | head -1 || echo "MISSING"
          echo -n "powerpc64-ps3-elf-gcc: "
          which powerpc64-ps3-elf-gcc && powerpc64-ps3-elf-gcc --version 2>/dev/null | head -1 || echo "MISSING"
          echo ""
          echo "=== Signing Tools ==="
          echo -n "make_self: "
          which make_self && echo "FOUND" || echo "MISSING"
          echo -n "package_finalize: "
          which package_finalize && echo "FOUND" || echo "MISSING"
          echo ""
          echo "=== SDK Directories ==="
          ls -la /usr/local/ps3dev/ 2>/dev/null || ls -la $PS3DEV 2>/dev/null || echo "No SDK dir"
          echo ""
          echo "========================================="
          echo "  ENVIRONMENT VERIFIED"
          echo "========================================="

      - name: 2-Build-ELF
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p bin
          echo "=== Compiling PS2PKGConv ==="
          powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf -static
          echo ""
          echo "=== ELF Result ==="
          ls -la bin/PS2PKGConv.elf
          file bin/PS2PKGConv.elf
          echo ""
          echo "OK: ELF built successfully"

      - name: 3-Create-SELF
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Creating SELF ==="
          make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
          echo ""
          echo "=== SELF Result ==="
          ls -la bin/PS2PKGConv.self
          echo ""
          echo "OK: SELF created"

      - name: 4-Create-PKG
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Building PKG ==="
          package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
          echo ""
          echo "=== PKG Result ==="
          ls -la PS2PKGConv.pkg
          echo ""
          echo "OK: PKG ready"

      - name: 5-Final-Verification
        run: |
          cd $GITHUB_WORKSPACE
          echo "========================================="
          echo "  FINAL VERIFICATION"
          echo "========================================="
          echo ""
          echo "=== Files ==="
          ls -la PS2PKGConv.pkg bin/PS2PKGConv.elf bin/PS2PKGConv.self
          echo ""
          echo "=== PKG Header ==="
          xxd PS2PKGConv.pkg | head -5
          echo ""
          echo "=== Size ==="
          du -h PS2PKGConv.pkg
          echo ""
          echo "========================================="
          echo "  PKG READY FOR PS3"
          echo "  Mr.Mouswi (c) 2026"
          echo "========================================="

      - name: 6-Upload-PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS2PKGConv-PKG-FINAL
          path: PS2PKGConv.pkg
