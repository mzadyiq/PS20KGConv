name: Build PS2PKGConv PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: [1/6] Checkout code
      uses: actions/checkout@v4
    
    - name: [2/6] Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y build-essential make git wget
    
    - name: [3/6] Install Required Libraries
      run: |
        sudo apt install -y flex bison texinfo
        sudo apt install -y libelf-dev libssl-dev zlib1g-dev
        sudo apt install -y libgmp-dev libmpfr-dev libmpc-dev
        sudo apt install -y libtool libtool-bin autoconf automake pkg-config
    
    - name: [4/6] Install PS3 SDK
      run: |
        export PS3DEV=$HOME/ps3dev
        export PSL1GHT=$HOME/ps3dev
        export PATH=$PS3DEV/bin:$PATH
        mkdir -p $PS3DEV/ppu
        
        cd ~
        git clone https://github.com/ps3dev/ps3toolchain
        cd ps3toolchain
        
        for f in depends/check-*.sh; do rm -f "$f"; touch "$f"; chmod +x "$f"; done
        
        bash toolchain.sh
        
        echo "PS3DEV=$PS3DEV" >> $GITHUB_ENV
        echo "PATH=$PS3DEV/bin:$PATH" >> $GITHUB_ENV
    
    - name: [5/6] Build ELF
      run: |
        export PS3DEV=$HOME/ps3dev
        export PATH=$PS3DEV/bin:$PATH
        cd $GITHUB_WORKSPACE
        mkdir -p bin
        powerpc64-ps3-elf-gcc -O2 -Wall source/main.c -o bin/PS2PKGConv.elf
    
    - name: [6/6] Sign and Build PKG
      run: |
        export PS3DEV=$HOME/ps3dev
        export PATH=$PS3DEV/bin:$PATH
        cd $GITHUB_WORKSPACE
        make_self bin/PS2PKGConv.elf bin/PS2PKGConv.self
        package_finalize bin/PS2PKGConv.self PS2PKGConv-001 PS2PKGConv.pkg
    
    - name: Upload PKG
      uses: actions/upload-artifact@v4
      with:
        name: PS2PKGConv-PKG
        path: PS2PKGConv.pkg
        
