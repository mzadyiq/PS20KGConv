name: PS3 Build Pipeline - Mr.Mouswi Edition

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # نستخدم 22.04 لضمان ثبات بعض المكتبات

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحديث لـ v4

      - name: Install Dependencies
        run: |
          sudo apt update
          # تثبيت الأدوات اللازمة والبدائل لـ OpenSSL
          sudo apt install -y build-essential git python3 bison flex libelf-dev libssl-dev zlib1g-dev autoconf

      - name: Setup PS3 Public Tools
        run: |
          git clone https://github.com/ifcaro/ps3publictools.git
          cd ps3publictools
          # حل مشكلة AES_ctr128_encrypt عبر ربط المكتبة بشكل صحيح
          make
          sudo make install
          cd ..

      - name: Compile and Package
        run: |
          make clean
          make
          # تأكد من أن Makefile الخاص بك يقوم باستدعاء الأدوات المثبتة

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4 # تحديث إجباري لـ v4
        with:
          name: PS20KGConv-Package
          path: "*.pkg"
          
