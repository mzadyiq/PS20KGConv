name: PS3-Pro-Build-MrMouswi

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git bison flex libelf-dev libssl-dev zlib1g-dev libncurses5-dev autoconf pkg-config

      - name: Setup PS3 Tools
        run: |
          # سحب وبناء أدوات التشفير والتوقيع
          git clone https://github.com/danilopiazza/ps3tools.git
          cd ps3tools
          make
          sudo make install
          cd ..

      - name: Build Application
        run: |
          # تجميع المشروع بناءً على مجلداتك
          make clean
          make

      - name: Upload Final PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS20KGConv-Final-Build
          path: "*.pkg"
          
