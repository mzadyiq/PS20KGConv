name: PS3 Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # استخدمنا صورة bucanero لأنها موجودة فعلياً وموثوقة جداً
    container: bucanero/ps3dev:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Application
        run: |
          # في هذه الحاوية، المسارات مجهزة مسبقاً
          # سنقوم بتنفيذ أمر البناء مباشرة
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Package-Output
          path: "*.pkg"
          if-no-files-found: error
          
