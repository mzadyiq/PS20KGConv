name: PS3 Build Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest # سنعمل مباشرة على نظام أوبونتو بدون Docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git auto-conf automake bison flex libelf-dev libgmp-dev libncurses5-dev libssl-dev libtool libz-dev make patch python3 texinfo wget pkg-config

      - name: Download Pre-built Toolchain
        run: |
          # سنقوم بتحميل نسخة مبنية مسبقاً ومرفوعة كملف مضغوط لتوفير وقت بناء 3 ساعات
          # هذه النسخة متوفرة غالباً في مخازن توزيعات الـ PS3 الموثوقة
          wget https://github.com/bucanero/ps3dev/releases/download/v1.0/ps3dev-ubuntu-latest.tar.gz
          sudo tar -xzf ps3dev-ubuntu-latest.tar.gz -C /
          
      - name: Set Environment Variables
        run: |
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH

      - name: Compile Application
        run: |
          # الآن المترجم موجود في المسار، يمكننا التجميع
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Package-Output
          path: "*.pkg"
          
